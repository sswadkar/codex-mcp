services:
  apple-mail:
    build:
      context: ../..
      dockerfile: servers/apple-mail/Dockerfile
    environment:
      PORT: "8080"
      AUTH_TOKEN: "${APPLE_MAIL_SERVER_AUTH_TOKEN:?set APPLE_MAIL_SERVER_AUTH_TOKEN}"
      BRIDGE_ENDPOINT: "http://host.docker.internal:8787"
      BRIDGE_AUTH_TOKEN: "${BRIDGE_AUTH_TOKEN}"
      REQUEST_TIMEOUT_MS: "10000"
      LOG_LEVEL: "info"
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
